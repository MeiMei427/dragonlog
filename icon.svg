    <!-- Eye -->
    <circle cx="305" cy="195" r="19" fill="#1a1a2e"/>
    <ellipse cx="308" cy="193" rx="7" ry="12" fill="#4ade80"/>
    <ellipse cx="309" cy="193" rx="3" ry="9" fill="#1a1a2e"/>

    <!-- Nostril -->
